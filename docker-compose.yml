services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dxjournal
    ports:
      - "80:80"
      - "5173:5173"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - laravel-network

  mysql:
    image: mysql:8.0
    container_name: dxjournal_container_db
    restart: always
    environment:
      MYSQL_DATABASE: dxjournal_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db_data:

